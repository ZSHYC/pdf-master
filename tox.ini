# ===========================================
# PDF-Master - Tox Configuration
# ===========================================
# Multi-environment testing configuration

[tox]
envlist = py38,py39,py310,py311,lint,coverage
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run tests with pytest
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
description = Run all linters
basepython = python3.11
deps =
    black>=23.0.0
    isort>=5.12.0
    flake8>=6.0.0
    mypy>=1.0.0
commands =
    black --check skills/pdf/scripts tests/
    isort --check skills/pdf/scripts tests/
    flake8 skills/pdf/scripts tests/ --max-line-length=100 --ignore=E501,W503
    mypy skills/pdf/scripts --ignore-missing-imports

[testenv:coverage]
description = Run tests with coverage report
basepython = python3.11
deps =
    -r requirements.txt
    -r requirements-dev.txt
commands =
    pytest tests/ -v --cov=skills/pdf/scripts --cov-report=html --cov-report=term

[testenv:format]
description = Format code with black and isort
basepython = python3.11
deps =
    black>=23.0.0
    isort>=5.12.0
commands =
    black skills/pdf/scripts tests/
    isort skills/pdf/scripts tests/

[testenv:clean]
description = Clean up generated files
basepython = python3.11
skip_install = True
commands =
    python -c "import shutil; import os; [shutil.rmtree(d, ignore_errors=True) for d in ['__pycache__', '.pytest_cache', '.coverage', 'htmlcov', '.mypy_cache', 'build', 'dist'] if os.path.exists(d)]"

[flake8]
max-line-length = 100
ignore = E501,W503
exclude = 
    .git,
    __pycache__,
    .tox,
    .eggs,
    *.egg,
    venv,
    .venv,
    tests/fixtures

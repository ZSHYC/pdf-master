# AI Provider Configuration
# 
# This file defines AI providers available to PDF Master.
# You can add custom providers or modify existing ones.
#
# Provider types:
#   - official: Official provider (Claude, OpenAI, etc.)
#   - openai-compatible: OpenAI API compatible provider
#   - local: Local model (Ollama, etc.)

providers:
  # Anthropic Claude
  - id: claude
    name: Claude (Anthropic)
    type: official
    api_base: https://api.anthropic.com
    models:
      - id: claude-sonnet-4-6
        name: Claude Sonnet 4.6
        max_tokens: 8192
      - id: claude-3-5-sonnet-20241022
        name: Claude 3.5 Sonnet
        max_tokens: 8192
      - id: claude-3-opus-20240229
        name: Claude 3 Opus
        max_tokens: 4096
    default_model: claude-sonnet-4-6
    cost_multiplier: 1.0
    env_key: ANTHROPIC_API_KEY
    
  # OpenAI
  - id: openai
    name: OpenAI
    type: official
    api_base: https://api.openai.com/v1
    models:
      - id: gpt-4o
        name: GPT-4o
        max_tokens: 4096
      - id: gpt-4-turbo
        name: GPT-4 Turbo
        max_tokens: 4096
      - id: gpt-3.5-turbo
        name: GPT-3.5 Turbo
        max_tokens: 4096
    default_model: gpt-4o
    cost_multiplier: 1.0
    env_key: OPENAI_API_KEY
    
  # Google Gemini
  - id: gemini
    name: Google Gemini
    type: official
    api_base: https://generativelanguage.googleapis.com
    models:
      - id: gemini-2.0-flash-exp
        name: Gemini 2.0 Flash
        max_tokens: 8192
      - id: gemini-1.5-pro
        name: Gemini 1.5 Pro
        max_tokens: 8192
    default_model: gemini-2.0-flash-exp
    cost_multiplier: 0.5
    env_key: GOOGLE_API_KEY
    
  # DeepSeek
  - id: deepseek
    name: DeepSeek
    type: openai-compatible
    api_base: https://api.deepseek.com/v1
    models:
      - id: deepseek-chat
        name: DeepSeek Chat
        max_tokens: 4096
      - id: deepseek-reasoner
        name: DeepSeek Reasoner
        max_tokens: 4096
    default_model: deepseek-chat
    cost_multiplier: 0.1
    env_key: DEEPSEEK_API_KEY
    
  # Qwen (通义千问)
  - id: qwen
    name: Qwen (通义千问)
    type: openai-compatible
    api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
    models:
      - id: qwen-turbo
        name: Qwen Turbo
        max_tokens: 4096
      - id: qwen-plus
        name: Qwen Plus
        max_tokens: 4096
      - id: qwen-max
        name: Qwen Max
        max_tokens: 4096
    default_model: qwen-turbo
    cost_multiplier: 0.2
    env_key: QWEN_API_KEY
    
  # Zhipu (智谱)
  - id: zhipu
    name: Zhipu GLM (智谱)
    type: official
    api_base: https://open.bigmodel.cn/api/paas/v4
    models:
      - id: glm-4-flash
        name: GLM-4 Flash
        max_tokens: 4096
      - id: glm-4
        name: GLM-4
        max_tokens: 4096
    default_model: glm-4-flash
    cost_multiplier: 0.1
    env_key: ZHIPU_API_KEY
    
  # Moonshot
  - id: moonshot
    name: Moonshot (Kimi)
    type: openai-compatible
    api_base: https://api.moonshot.cn/v1
    models:
      - id: moonshot-v1-8k
        name: Moonshot V1 8K
        max_tokens: 8192
      - id: moonshot-v1-32k
        name: Moonshot V1 32K
        max_tokens: 32768
    default_model: moonshot-v1-8k
    cost_multiplier: 0.3
    env_key: MOONSHOT_API_KEY
    
  # Ollama (本地)
  - id: ollama
    name: Ollama (Local)
    type: local
    api_base: http://localhost:11434
    models:
      - id: llama3.2
        name: Llama 3.2
        max_tokens: 4096
      - id: llama3
        name: Llama 3
        max_tokens: 4096
      - id: mistral
        name: Mistral
        max_tokens: 4096
    default_model: llama3.2
    cost_multiplier: 0.0
    env_key: null

# Default provider to use when not specified
default_provider: claude

# Cost management (optional)
cost_limits:
  daily_usd: null    # Set to limit daily cost
  monthly_usd: null  # Set to limit monthly cost
  tracking_enabled: false
